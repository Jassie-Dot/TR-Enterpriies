<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TR Admin | Remote Site Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body class="is-locked">
    <section class="admin-login" data-admin-login>
      <form class="login-card" data-login-form>
        <span class="login-mark">TR</span>
        <p>Remote Site Control</p>
        <h1>Enter admin password.</h1>
        <label>
          Password
          <input type="password" name="password" inputmode="numeric" autocomplete="current-password" required autofocus />
        </label>
        <button type="submit">Unlock Admin</button>
        <div class="login-note" data-login-note></div>
      </form>
    </section>

    <header class="admin-topbar" data-admin-app>
      <a class="admin-brand" href="/" data-view-site>
        <span>TR</span>
        <strong>Site Control</strong>
      </a>
      <nav>
        <a href="/" target="_blank" rel="noopener" data-view-site>View Site</a>
        <button class="ghost-button" type="button" data-logout>Lock</button>
        <button type="button" data-save>Save Changes</button>
      </nav>
    </header>

    <main class="admin-shell" data-admin-app>
      <aside class="admin-sidebar">
        <p>Content Areas</p>
        <button class="is-active" type="button" data-tab-button="brand">Brand</button>
        <button type="button" data-tab-button="hero">Hero</button>
        <button type="button" data-tab-button="sections">Sections</button>
        <button type="button" data-tab-button="metrics">Metrics</button>
        <button type="button" data-tab-button="services">Services</button>
        <button type="button" data-tab-button="projects">Projects</button>
        <button type="button" data-tab-button="process">Process</button>
        <button type="button" data-tab-button="testimonials">Reviews</button>
        <button type="button" data-tab-button="gallery">Gallery</button>
        <button type="button" data-tab-button="raw">Raw JSON</button>
      </aside>

      <section class="admin-workspace">
        <div class="admin-head">
          <div>
            <p>TR-Enterpriies Admin</p>
            <h1>Edit the live website content.</h1>
          </div>
          <div class="admin-status" data-status>Loading site data...</div>
        </div>

        <div class="editor-panel is-active" data-tab-panel="brand"></div>
        <div class="editor-panel" data-tab-panel="hero"></div>
        <div class="editor-panel" data-tab-panel="sections"></div>
        <div class="editor-panel" data-tab-panel="metrics"></div>
        <div class="editor-panel" data-tab-panel="services"></div>
        <div class="editor-panel" data-tab-panel="projects"></div>
        <div class="editor-panel" data-tab-panel="process"></div>
        <div class="editor-panel" data-tab-panel="testimonials"></div>
        <div class="editor-panel" data-tab-panel="gallery"></div>
        <div class="editor-panel" data-tab-panel="raw">
          <div class="panel-title">
            <h2>Raw JSON</h2>
            <button type="button" data-apply-json>Apply JSON To Editor</button>
          </div>
          <textarea class="raw-json" spellcheck="false" data-raw-json></textarea>
        </div>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
